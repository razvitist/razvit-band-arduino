; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
; custom https://stackoverflow.com/questions/71937708/partition-tables-esp32-3mb-no-ota-1mb-spiffs-platform-io
; https://docs.platformio.org/en/latest/platforms/espressiс f32.html
; https://github.com/espressif/arduino-esp32/tree/master/tools/partitions
; partitions
; disable ota update platformio https://community.platformio.org/t/disable-ota-build/28354
; partition generator https://www.esp32.com/viewtopic.php?t=18575
; board_build.partitions = default_16MB.csv ; Отключение OTA update, чтобы увеличить место
; custom.csv
; default_16MB.csv
; default_8MB.csv
; no_ota.csv
; board_build.f_flash = 40000000L

; framework = arduino
; framework = espidf
framework = arduino, espidf
build_flags = -Wno-error=old-style-declaration

lib_deps = 
  ; https://github.com/joltwallet/esp_littlefs.git
	bblanchon/ArduinoJson@^6.19.4
	ottowinter/ESPAsyncTCP-esphome@^1.2.3
	ottowinter/ESPAsyncWebServer-esphome@^3.0.0
	ayushsharma82/AsyncElegantOTA@^2.2.7
; monitor_speed = 9600
monitor_speed = 115200
board_build.filesystem = littlefs

