<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Аккумулятор</title>
    <link href="/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="container">
      <br />
      <div class="d-flex justify-content-between align-items-center">
        <a href="/"><img class="l-arrow" /></a>
        <div><span class="h6">Аккумулятор</span></div>
        <img class="l-arrow" style="visibility: hidden" />
      </div>
      <br />
      <form action="/get">
        <div class="progress mb-3" style="height: 4rem">
          <div
            id="battery"
            class="progress-bar progress-bar-striped progress-bar-animated"
            role="progressbar"
            aria-valuenow="%battery%"
            aria-valuemin="0"
            aria-valuemax="100"
            style="width: %battery%%%; font-size: 2rem"
          >
            <span class="d-flex align-items-center justify-content-center">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="28"
                height="28"
                fill="white"
                class="bi bi-lightning-charge-fill"
                viewBox="0 0 16 16"
                style="display: none"
              >
                <path
                  d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"
                />
              </svg>
              <span id="battery-span">%battery%%%</span>
            </span>
          </div>
        </div>
        <label for="input1" class="form-label">Время сна</label>
        <div class="mb-3">
          <div class="input-group">
            <input
              name="sleep"
              value="%sleep%"
              type="number"
              class="form-control"
              id="input1"
              step="1"
              min="1"
            />
            <span class="input-group-text">сек</span>
          </div>
          <div class="form-text">
            Время сна после неудачной попытки подключения к Wi-Fi или при
            отсутствии расписания. Увеличение времени сна позволит сэкономить
            заряд аккумулятора
          </div>
        </div>
        <br />
        <div class="d-flex justify-content-between">
          <button type="submit" class="btn btn-outline-primary">
            Сохранить
          </button>
          <button type="reset" class="btn btn-outline-danger">Отменить</button>
        </div>
      </form>
    </div>
    <script src="/bootstrap.min.js" type="text/javascript"></script>
    <script src="/script.js" type="text/javascript"></script>
    <script type="text/javascript">
      if ('%charge%' != '') {
        document.querySelector('.bi-lightning-charge-fill').style =
          'display: inline';
        document.getElementById('battery').classList.add('bg-success');
      }
      setInterval(() => {
        // lightning-charge / lightning-charge-fill
        let xhttp = new XMLHttpRequest();
        xhttp.open('GET', '/get-battery', false);
        xhttp.send();
        let x = xhttp.responseText;
        document.getElementById('battery-span').innerHTML = x + '%%';
        document.getElementById('battery').style =
          `width: ${x}%%; font-size: 2rem;`;

        xhttp = new XMLHttpRequest();
        xhttp.open('GET', '/get-charge', false);
        xhttp.send();
        x = xhttp.responseText;

        switch (x) {
          // "bg-danger" - красный
          case 'Standby':
            document.getElementById('battery').classList.add('bg-success');
            document.querySelector('.bi-lightning-charge-fill').style =
              'display: inline';
            break;
          case 'Charge':
            document.getElementById('battery').classList.add('bg-success');
            document.querySelector('.bi-lightning-charge-fill').style =
              'display: inline';
            break;
          case '':
            document.getElementById('battery').classList.remove('bg-success');
            document.querySelector('.bi-lightning-charge-fill').style =
              'display: none';
            break;
        }
      }, 1000);
    </script>
  </body>
</html>
