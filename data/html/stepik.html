<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepik</title>
  <link href="/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="/style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="container">
    <br>
    <div class="d-flex justify-content-between align-items-center">
      <a href="/"><img class="l-arrow"></a>
      <div><span class="h6">Stepik</span></div>
      <img class="l-arrow" style="visibility: hidden;">
    </div>
    <br>
    <form action="/get">
      <div class="mb-3">
        <label for="input1" class="form-label">ID профиля</label>
        <input name="stepikID" value="%stepikID%" type="number" class="form-control" id="input1" step="1" min="0">
        <div class="form-text">Перейдите на страницу профиля и скопируйте цифры в конце ссылки (stepik.org/users/XXX)</div>
      </div>
      <label for="input2" class="form-label">Время за одну задачу</label>
      <div class="input-group mb-3">
        <input name="stepikOne" value="%stepikOne%" type="number" class="form-control" id="input2" step="1" min="1">
        <span class="input-group-text">мин</span>
      </div>
      <label for="input3" class="form-label">Макс. время сна</label>
      <div class="input-group mb-3">
        <input name="stepikMax" value="%stepikMax%" type="number" class="form-control" id="input3" step="1" min="0">
        <span class="input-group-text">мин</span>
      </div>
      <div class="form-text">На сайте stepik.org есть множество образовательных курсов. За каждое решённое задание даётся определённое время</div>
      <br>
      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-outline-primary">Сохранить</button>
        <button type="reset" class="btn btn-outline-danger">Отменить</button>
      </div>
    </form>
  </div>
  <script src="/bootstrap.min.js" type="text/javascript"></script>
  <script src="/script.js" type="text/javascript"></script>
</body>
</html>
