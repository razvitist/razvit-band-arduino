<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leetcode</title>
  <link href="/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="/style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="container">
    <br>
    <div class="d-flex justify-content-between align-items-center">
      <a href="/"><img class="l-arrow"></a>
      <div><span class="h6">Leetcode</span></div>
      <img class="l-arrow" style="visibility: hidden;">
    </div>
    <br>
    <form action="/get">
      <div class="mb-3">
        <label for="input1" class="form-label">Никнейм</label>
        <input name="leetcodeName" value="%leetcodeName%" type="text" class="form-control" id="input1">
        <div class="form-text">Перейдите на страницу профиля и скопируйте никнейм в конце ссылки</div>
      </div>

      <label class="form-label">Время за задачу</label>
      <div class="input-group flex-nowrap mb-3">
        <span class="input-group-text" id="addon-wrapping" style="min-width: 5.5rem">Easy</span>
        <input name="leetcodeEasy" value="%leetcodeEasy%" type="number" class="form-control" step="1" min="0">
        <span class="input-group-text">мин</span>
      </div>
      <div class="input-group flex-nowrap mb-3">
        <span class="input-group-text" id="addon-wrapping" style="min-width: 5.5rem">Medium</span>
        <input name="leetcodeMedium" value="%leetcodeMedium%" type="number" class="form-control" step="1" min="0">
        <span class="input-group-text">мин</span>
      </div>
      <div class="input-group flex-nowrap mb-3">
        <span class="input-group-text" id="addon-wrapping" style="min-width: 5.5rem">Hard</span>
        <input name="leetcodeHard" value="%leetcodeHard%" type="number" class="form-control" step="1" min="0">
        <span class="input-group-text">мин</span>
      </div>
      <label for="input2" class="form-label">Макс. время сна</label>
      <div class="input-group mb-3">
        <input name="leetcodeMax" value="%leetcodeMax%" type="number" class="form-control" id="input2" step="1" min="0">
        <span class="input-group-text">мин</span>
      </div>
      <div class="form-text">За каждый уровень сложности задач можно установить разное время</div>
      <br>
      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-outline-primary">Сохранить</button>
        <button type="reset" class="btn btn-outline-danger">Отменить</button>
      </div>
    </form>
  </div>
  <script src="/bootstrap.min.js" type="text/javascript"></script>
  <script src="/script.js" type="text/javascript"></script>
</body>
</html>
