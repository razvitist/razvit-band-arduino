<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Перерыв на еду</title>
  <link href="/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="/style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="container">
    <br>
    <div class="d-flex justify-content-between align-items-center">
      <a href="/"><img class="l-arrow"></a>
      <div><span class="h6">Перерыв на еду</span></div>
      <img class="l-arrow" style="visibility: hidden;">
    </div>
    <br>
    <form action="/get">
      <label for="input1" class="form-label">Длина перерыва</label>
      <div class="mb-3">
        <div class="input-group">
          <input name="foodLen" value="%foodLen%" type="number" class="form-control" id="input1" step="1" min="0">
          <span class="input-group-text">мин</span>
        </div>
        <div class="form-text">0 - отсутствие перерыва</div>
      </div>
      <label for="input2" class="form-label">Время до следующего перерыва</label>
      <div class="mb-3">
        <div class="input-group">
          <input name="foodNext" value="%foodNext%" type="number" class="form-control" id="input2" step="1" min="0">
          <span class="input-group-text">мин</span>
        </div>
        <div class="form-text">Предотвращает использование перерыва несколько раз подряд</div>
      </div>
      <br>
      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-outline-primary">Сохранить</button>
        <button type="reset" class="btn btn-outline-danger">Отменить</button>
      </div>
    </form>
  </div>
  <script src="/bootstrap.min.js" type="text/javascript"></script>
  <script src="/script.js" type="text/javascript"></script>
</body>
</html>
