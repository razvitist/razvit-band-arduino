<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anki</title>
    <link href="/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <div class="container">
      <br />
      <div class="d-flex justify-content-between align-items-center">
        <a href="/"><img class="l-arrow" /></a>
        <div><span class="h6">Anki</span></div>
        <img class="l-arrow" style="visibility: hidden" />
      </div>
      <br />
      <form action="/get">
        <label for="input1" class="form-label">Время за карточку</label>
        <div class="input-group mb-3">
          <input
            name="ankiOne"
            value="%ankiOne%"
            type="number"
            class="form-control"
            id="input1"
            step="1"
            min="1"
          />
          <span class="input-group-text">сек</span>
        </div>
        <label for="input2" class="form-label">Макс. время сна</label>
        <div class="input-group mb-3">
          <input
            name="ankiMax"
            value="%ankiMax%"
            type="number"
            class="form-control"
            id="input2"
            step="1"
            min="0"
          />
          <span class="input-group-text">сек</span>
        </div>

        <label for="input3" class="form-label">Время за карточку (rated)</label>
        <div class="input-group mb-3">
          <input
            name="ankiRatedOne"
            value="%ankiRatedOne%"
            type="number"
            class="form-control"
            id="input3"
            step="1"
            min="1"
          />
          <span class="input-group-text">сек</span>
        </div>
        <label for="input4" class="form-label">Макс. время сна</label>
        <div class="input-group mb-3">
          <input
            name="ankiRatedMax"
            value="%ankiRatedMax%"
            type="number"
            class="form-control"
            id="input4"
            step="1"
            min="0"
          />
          <span class="input-group-text">сек</span>
        </div>

        <label for="input5" class="form-label"
          >Время за создание карточки</label
        >
        <div class="input-group mb-3">
          <input
            name="ankiAddOne"
            value="%ankiAddOne%"
            type="number"
            class="form-control"
            id="input5"
            step="1"
            min="1"
          />
          <span class="input-group-text">сек</span>
        </div>
        <label for="input6" class="form-label">Макс. время сна</label>
        <div class="input-group mb-3">
          <input
            name="ankiAddMax"
            value="%ankiAddMax%"
            type="number"
            class="form-control"
            id="input6"
            step="1"
            min="0"
          />
          <span class="input-group-text">сек</span>
        </div>

        <br />
        <div class="d-flex justify-content-between">
          <button type="submit" class="btn btn-outline-primary">
            Сохранить
          </button>
          <button type="reset" class="btn btn-outline-danger">Отменить</button>
        </div>
      </form>
    </div>
    <script src="/bootstrap.min.js" type="text/javascript"></script>
    <script src="/script.js" type="text/javascript"></script>
  </body>
</html>
