<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom</title>
  <link href="/bootstrap.min.css" rel="stylesheet" type="text/css">
  <link href="/style.css" rel="stylesheet" type="text/css">
</head>
<body>
  <div class="container">
    <br>
    <div class="d-flex justify-content-between align-items-center">
      <a href="/"><img class="l-arrow"></a>
      <div><span class="h6">Custom</span></div>
      <img class="l-arrow" style="visibility: hidden;">
    </div>
    <br>
    <form action="/get">
      <div id="cards"></div>
      <div class="d-grid gap-2"><button type="button" class="btn btn-outline-primary" onclick="create()">+</button></div>
      <br>
      <div class="d-flex justify-content-between">
        <button type="submit" class="btn btn-outline-primary">Сохранить</button>
        <button type="reset" class="btn btn-outline-danger">Отменить</button>
      </div>
    </form>
  </div>
  <script>
    let n = 0
    let client = new XMLHttpRequest()
    client.open('GET', '/custom.json')
    let customjson = {}
    // customjson = {20: ['xxx', 1, 60], 21: ['z', 1, 60]} // test
    client.onload = function() {
      customjson = JSON.parse(client.responseText)
      for (let i in customjson){
        n++
        let x = document.createElement("div")
        x.innerHTML = `<div class="card mb-3" id="card${n}">
        <div class="card-body">
          <div class="mb-3">
            <label for="input1${n}" class="form-label">Название</label>
            <input name="customName" value="${i}" type="text" class="form-control" id="input1${n}">
          </div>
          <label for="input2${n}" class="form-label">Время за один балл</label>
          <div class="input-group mb-3">
            <input name="customOne" value="${customjson[i][0]}" type="number" class="form-control" id="input2${n}" step="1" min="1">
            <span class="input-group-text">сек</span>
          </div>
          <label for="input3${n}" class="form-label">Макс. время сна</label>
          <div class="input-group mb-3">
            <input name="customMax" value="${customjson[i][1]}" type="number" class="form-control" id="input3${n}" step="1" min="0">
            <span class="input-group-text">сек</span>
          </div>
          <div class="d-grid gap-2"><button type="button" class="btn btn-outline-danger" onclick="this.parentElement.parentElement.parentElement.remove()">Удалить</button></div>
        </div>
      </div>`
        document.querySelector('#cards').appendChild(x)
      }
    }
    client.send()
    function create(){
      n++
      let x = document.createElement("div")
      x.innerHTML = `<div class="card mb-3" id="card${n}">
        <div class="card-body">
          <div class="mb-3">
            <label for="input1${n}" class="form-label">Название</label>
            <input name="customName" type="text" class="form-control" id="input1${n}">
          </div>
          <label for="input2${n}" class="form-label">Время за один балл</label>
          <div class="input-group mb-3">
            <input name="customOne" type="number" class="form-control" id="input2${n}" step="1" min="1">
            <span class="input-group-text">сек</span>
          </div>
          <label for="input3${n}" class="form-label">Макс. время сна</label>
          <div class="input-group mb-3">
            <input name="customMax" type="number" class="form-control" id="input3${n}" step="1" min="0">
            <span class="input-group-text">сек</span>
          </div>
          <div class="d-grid gap-2"><button type="button" class="btn btn-outline-danger" onclick="this.parentElement.parentElement.parentElement.remove()">Удалить</button></div>
        </div>
      </div>`
      document.querySelector('#cards').appendChild(x)
    }
    const form = document.querySelector('form')
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const cards = form.querySelectorAll('.card')
      // let body = []
      let body = {}
      let iplus = 0
      for (let card of cards){
        body[card.querySelector('[name=customName]').value] = [card.querySelector('[name=customOne]').value, card.querySelector('[name=customMax]').value]
      }
      console.log(body)
      xhr = new XMLHttpRequest()
      xhr.open('POST', '/post-custom')
      xhr.responseType = 'json'
      xhr.setRequestHeader('Content-Type', 'application/json')
      xhr.send(JSON.stringify(body))
    })
  </script>
  <script src="/bootstrap.min.js" type="text/javascript"></script>
  <script src="/script.js" type="text/javascript"></script>
</body>
</html>
